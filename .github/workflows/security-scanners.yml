name: Security Scanners

# Standalone security-scanner workflow (split out of build-test.yml). Runs
# flawfinder, clang-tidy and semgrep, uploading SARIF to the Security
# tab. Third-party actions pinned to commit SHAs — see build-test.yml header.

on:
  schedule:
    # Monthly, 1st @ 04:17 UTC.
    - cron: "17 4 1 * *"
  workflow_dispatch: {}

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secure:
    name: Secure
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Cache apt packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /var/cache/apt/archives
          key: apt-secure-${{ runner.os }}-flawfinder-clang-tidy-nginx-dev
          restore-keys: apt-secure-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flawfinder \
            clang-tidy \
            python3 \
            python3-pip \
            nginx-dev

      - name: Cache pip packages (semgrep)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-semgrep-${{ runner.os }}

      - name: Install semgrep
        run: |
          pip3 install --quiet semgrep
          semgrep --version

      - name: Cache semgrep rules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.semgrep
          key: semgrep-rules-${{ runner.os }}-p-c-security-audit

      - name: Configure a real nginx source tree (for clang-tidy headers)
        run: |
          # clang-tidy must actually compile the translation unit, which needs
          # the COMPLETE nginx headers — including the generated
          # objs/ngx_auto_config.h and objs/ngx_auto_headers.h. The nginx-dev
          # package ships headers but NOT the build system (no auto/configure),
          # so it can never generate those: clang-tidy then aborted with
          # "'ngx_auto_headers.h' file not found" — a clang-diagnostic-error
          # that failed the GATING pass on every run (a false gate, not a real
          # cert-/security finding). Download + configure a real nginx source,
          # exactly like build-test.yml's scan-build job.
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V | tail -1)
          echo "Using nginx $ver to generate lint headers"
          wget -q "https://nginx.org/download/nginx-${ver}.tar.gz"
          tar -xzf "nginx-${ver}.tar.gz"
          cd "nginx-${ver}"
          CC=gcc ./configure --with-compat \
            --add-dynamic-module="$GITHUB_WORKSPACE" > /dev/null
          test -f objs/ngx_auto_config.h
          echo "NGINX_SRC_TREE=$PWD" >> "$GITHUB_ENV"
          echo "✓ ngx_auto_config.h generated"

      - name: flawfinder (security risk scanner, SARIF)
        run: |
          flawfinder --minlevel=1 --sarif \
            "$GITHUB_WORKSPACE/filter/ngx_http_zstd_filter_module.c" \
            "$GITHUB_WORKSPACE/static/ngx_http_zstd_static_module.c" \
            > flawfinder.sarif 2>/dev/null || true
          flawfinder --minlevel=1 \
            "$GITHUB_WORKSPACE/filter/ngx_http_zstd_filter_module.c" \
            "$GITHUB_WORKSPACE/static/ngx_http_zstd_static_module.c" \
            2>&1 | tee flawfinder.log
          echo "✓ flawfinder: Scan complete"

      - name: Upload flawfinder SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: flawfinder.sarif
          category: flawfinder
        continue-on-error: true

      - name: clang-tidy (cert-*, bugprone-*, clang-analyzer-security.*)
        run: |
          set -euo pipefail
          N="$NGINX_SRC_TREE"
          INCLUDES="-I$N/src/core -I$N/src/event -I$N/src/event/modules \
            -I$N/src/event/quic -I$N/src/os/unix -I$N/objs -I$N/src/http \
            -I$N/src/http/modules -I$N/src/http/v2 -I/usr/include"
          : > clang-tidy.log
          status=0
          for f in \
            "$GITHUB_WORKSPACE/filter/ngx_http_zstd_filter_module.c" \
            "$GITHUB_WORKSPACE/static/ngx_http_zstd_static_module.c"; do
            echo "--- clang-tidy: $(basename "$f") ---"
            # Two passes. GATING pass: the security/cert checks (low false-
            # positive, the actual point of audit CI1) run with
            # --warnings-as-errors so a finding fails the job. ADVISORY pass:
            # the noisier bugprone-*/clang-analyzer-unix.* checks are reported
            # to the log/SARIF but do not gate (they flag nginx pool idioms);
            # promote them to the gating set once a checked-in baseline exists.
            #
            # clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling
            # is excluded: it is the C11 Annex K checker that flags every
            # memcpy/memset/strcpy and demands the *_s bounded variants
            # (memset_s, ...). Annex K is optional and not implemented by glibc,
            # and nginx zeroes/copies exclusively through ngx_memzero/ngx_memcpy
            # (= memset/memcpy), so this checker fires on every such call (here:
            # the ngx_memzero in the compress loop and the static handler) with
            # no portable fix. It is a documented FP for nginx-idiom code; the
            # rest of clang-analyzer-security.* and all cert-* stay gating.
            # INCLUDES and the pkg-config output are flag lists that MUST
            # word-split into individual clang-tidy compiler arguments.
            # shellcheck disable=SC2086,SC2046
            clang-tidy "$f" \
              --checks='-*,cert-*,clang-analyzer-security.*,-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling' \
              --warnings-as-errors='*' \
              -- -DZSTD_STATIC_LINKING_ONLY $INCLUDES $(pkg-config --cflags libzstd) \
              2>&1 | tee -a clang-tidy.log || status=1
            # shellcheck disable=SC2086,SC2046
            clang-tidy "$f" \
              --checks='-*,clang-analyzer-unix.*,bugprone-*' \
              -- -DZSTD_STATIC_LINKING_ONLY $INCLUDES $(pkg-config --cflags libzstd) \
              2>&1 | tee -a clang-tidy.log || true
          done
          echo "✓ clang-tidy: scan complete (security/cert gated)"
          exit "$status"

      - name: semgrep (C rule set — buffer overflows, unsafe fns, integer issues)
        run: |
          semgrep scan \
            --config "p/c" \
            --config "p/security-audit" \
            --sarif --output semgrep.sarif \
            "$GITHUB_WORKSPACE/filter/" "$GITHUB_WORKSPACE/static/" 2>&1 | tee semgrep.log || true
          echo "✓ semgrep: Scan complete"

      - name: Upload semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: security-reports
          path: |
            ${{ github.workspace }}/flawfinder.log
            ${{ github.workspace }}/flawfinder.sarif
            ${{ github.workspace }}/clang-tidy.log
            ${{ github.workspace }}/semgrep.log
            ${{ github.workspace }}/semgrep.sarif
          retention-days: 14
