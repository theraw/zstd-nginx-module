name: Build & Test

# Third-party actions are pinned to commit SHAs for supply-chain safety.
# This pin table is the canonical reference for ALL workflow files
# (build-test.yml, codeql.yml, security-scanners.yml, fuzzing.yml) —
# keep them consistent.
# actions/checkout@v5          -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/cache@v4             -> 0057852bfaa89a56745cba8c7296529d2fc39830
# actions/upload-artifact@v5   -> 330a01c490aca151604b8cf639adc76d48f6c5d4
# actions/download-artifact@v5 -> 634f93cb2916e3fdff6788551b99b062d0335ce0
# github/codeql-action/*@v4    -> 8aad20d150bbac5944a9f9d289da16a4b0d87c1e

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # NGINX_VERSION is NOT pinned here. The `resolve` job scrapes nginx.org for
  # the current mainline release and feeds it via needs.resolve.outputs.*; per-
  # job env: blocks below override this placeholder with the resolved value.
  NGINX_VERSION: ""
  # The `resolve` job scrapes nginx.org for the current mainline release at run
  # time and feeds it to every job via `needs.resolve.outputs.nginx_version`
  # (and the build matrix JSON). This makes the weekly cron actually test the
  # module against new releases as they ship, instead of failing once nginx.org
  # drops an old tarball.

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]
  schedule:
    # Weekly Monday 04:17 UTC — catches nginx API drift against new releases
    # even when nothing is pushed.
    - cron: "17 4 * * 1"
  workflow_dispatch: {}

# Cancel superseded runs on the same ref instead of piling up runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token. Jobs that need more request it explicitly.
permissions:
  contents: read

jobs:

  # ── Resolve the current mainline nginx version once per run ───────────────
  #    Scrapes nginx.org and exposes a bare version string and a single-entry
  #    build-matrix JSON (nginx mainline only). Every other job consumes
  #    needs.resolve.outputs.* so the whole run agrees on one version.
  #    nginx.org only keeps the newest mainline tarball around, so resolving
  #    at run time is what keeps CI from 404ing after a release.
  resolve:
    name: Resolve nginx version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      nginx_version: ${{ steps.v.outputs.nginx_version }}
      matrix: ${{ steps.v.outputs.matrix }}
    steps:
      - name: Resolve latest mainline nginx
        id: v
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V | tail -1)
          if [ -z "$ver" ]; then
            echo "::error::could not resolve mainline nginx version from nginx.org"
            exit 1
          fi
          echo "Resolved nginx mainline: $ver"
          matrix=$(printf 'matrix={"include":[{"flavor":"nginx","version":"%s","url":"https://nginx.org/download/nginx-%s.tar.gz","dir":"nginx-%s"}]}' \
            "$ver" "$ver" "$ver")
          {
            echo "nginx_version=$ver"
            echo "$matrix"
          } >> "$GITHUB_OUTPUT"

  # ── Lint & static analysis — no nginx build, fully independent ────────────
  validation:
    name: Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # Lint the workflow files themselves. actionlint validates GitHub
      # Actions expression contexts (e.g. "env is not allowed in a job
      # name:") that a plain YAML parser cannot catch — exactly the class
      # of error that previously took the whole pipeline down. Runs first
      # so a broken workflow fails fast and obviously.
      - name: Lint workflows (actionlint)
        run: |
          ACTIONLINT_VERSION=1.7.7
          curl -fsSL -o /tmp/actionlint.tgz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
          /tmp/actionlint -color "$GITHUB_WORKSPACE"/.github/workflows/*.yml
          echo "✓ actionlint: workflows valid"

      - name: Cache apt packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /var/cache/apt/archives
          key: apt-validation-${{ runner.os }}-shellcheck-cppcheck-clang-tools-nginx-dev
          restore-keys: apt-validation-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libpcre2-dev \
            zlib1g-dev \
            shellcheck \
            cppcheck \
            clang-tools \
            python3 \
            nginx-dev

      - name: Validate tool scripts (syntax only)
        run: |
          cd "$GITHUB_WORKSPACE/tools"
          bash -n ci-build.sh
          echo "✓ All tool scripts: syntax OK"

      - name: Python tool validation
        run: |
          cd "$GITHUB_WORKSPACE/tools"
          python3 test_encoding.py --help | head -3
          echo "✓ Python tools validated"

      - name: Python unit tests (test harness self-checks)
        run: |
          cd "$GITHUB_WORKSPACE/tools"
          python3 -m unittest -v test_test_encoding test_test_package_artifact
          echo "✓ Python harness unit tests passed"

      - name: Shell script linting (shellcheck)
        run: |
          # Gate on error-severity findings (real bugs); style/info noise does
          # not fail CI. The previous blanket "|| true" is dropped so a real
          # error-level finding now fails the job. See audit CI1.
          shellcheck --severity=error "$GITHUB_WORKSPACE"/tools/*.sh
          echo "✓ shellcheck complete (no error-severity findings)"

      - name: Configure a real nginx source tree (for scan-build headers)
        run: |
          # scan-build needs the COMPLETE nginx headers — including the
          # generated objs/ngx_auto_config.h. The nginx-dev package ships
          # headers but NOT the build system (no auto/configure), so it can
          # never produce ngx_auto_config.h; the old approach silently failed
          # and scan-build "passed" on incomplete headers (the CI2 complaint).
          # Download + configure a real nginx source instead.
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V | tail -1)
          echo "Using nginx $ver to generate lint headers"
          wget -q "https://nginx.org/download/nginx-${ver}.tar.gz"
          tar -xzf "nginx-${ver}.tar.gz"
          cd "nginx-${ver}"
          CC=gcc ./configure --with-compat \
            --add-dynamic-module="$GITHUB_WORKSPACE" > /dev/null
          test -f objs/ngx_auto_config.h
          echo "NGINX_SRC_TREE=$PWD" >> "$GITHUB_ENV"
          echo "✓ ngx_auto_config.h generated"

      - name: cppcheck (static analysis)
        run: |
          # Gate on real bug categories (warning/performance/portability), not
          # the full --enable=all style/unusedFunction noise. error-exitcode=1
          # fails the job on any such finding; a checked-in suppressions file is
          # the baseline for accepted exceptions. The blanket continue-on-error
          # that previously neutered this is removed. See audit CI1.
          cppcheck --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppressions-list="$GITHUB_WORKSPACE/tools/cppcheck-suppressions.txt" \
            "$GITHUB_WORKSPACE/filter/ngx_http_zstd_filter_module.c" \
            "$GITHUB_WORKSPACE/static/ngx_http_zstd_static_module.c" \
            2>&1 | tee cppcheck.log
          echo "✓ cppcheck complete (no gated findings)"

      - name: clang static analyzer
        run: |
          N="$NGINX_SRC_TREE"
          INCLUDE_FLAGS="-I$N/src/core -I$N/src/event -I$N/src/event/modules \
            -I$N/src/event/quic -I$N/src/os/unix -I$N/objs -I$N/src/http \
            -I$N/src/http/modules -I$N/src/http/v2 -I/usr/include"
          # Scan BOTH module sources (the static module was previously
          # unscanned), against the COMPLETE configured nginx headers, and let
          # --status-bugs actually fail the job: the old "|| echo" swallowed its
          # non-zero exit so a finding (or a compile failure on missing headers)
          # never gated. See audit CI1/CI2.
          # INCLUDE_FLAGS is a list of -I flags that MUST word-split into
          # separate gcc arguments; quoting it would pass one bogus arg.
          # shellcheck disable=SC2086
          scan-build --status-bugs \
            gcc -c $INCLUDE_FLAGS \
            "$GITHUB_WORKSPACE/filter/ngx_http_zstd_filter_module.c" \
            "$GITHUB_WORKSPACE/static/ngx_http_zstd_static_module.c" \
            2>&1 | tee clang-scan.log
          rm -f ngx_http_zstd_filter_module.o ngx_http_zstd_static_module.o

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: lint-reports
          path: |
            ${{ github.workspace }}/cppcheck.log
            ${{ github.workspace }}/clang-scan.log
          retention-days: 7

  # ── Build the module against nginx mainline (amd64) ─────────────────────
  build:
    name: Build (${{ matrix.flavor }} ${{ matrix.version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: resolve
    strategy:
      fail-fast: false
      # nginx mainline, assembled by the resolve job.
      matrix: ${{ fromJSON(needs.resolve.outputs.matrix) }}

    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Cache apt packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /var/cache/apt/archives
          key: apt-build-${{ runner.os }}-build-essential-libzstd-libpcre2-zlib
          restore-keys: apt-build-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libzstd-dev \
            libpcre2-dev \
            zlib1g-dev \
            ccache \
            wget

      - name: Set up ccache
        run: |
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"
          echo "CCACHE_DIR=$HOME/.ccache" >> "$GITHUB_ENV"

      - name: Cache ccache objects
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ matrix.flavor }}-${{ matrix.version }}-${{ hashFiles('filter/*.c', 'static/*.c', '*.h', 'config') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.flavor }}-${{ matrix.version }}-
            ccache-${{ runner.os }}-

      - name: Cache server source tarball
        id: src-tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ matrix.dir }}.tar.gz
          key: src-${{ matrix.flavor }}-${{ matrix.version }}

      - name: Download server source tarball
        if: steps.src-tarball.outputs.cache-hit != 'true'
        run: wget -q -O "${{ matrix.dir }}.tar.gz" "${{ matrix.url }}"

      - name: Configure (full debug build)
        run: |
          tar -xzf "${{ matrix.dir }}.tar.gz"
          cd "${{ matrix.dir }}"
          # Full debug compile flags:
          #   --with-debug          nginx debug logging (ngx_log_debug*)
          #   -g3                   max debug info incl. macro definitions
          #   -O0                   no optimisation — accurate line/var info
          #   -fno-omit-frame-pointer  reliable backtraces under gdb/valgrind
          #   -funwind-tables       unwind info for crash backtraces
          #   -DNGX_DEBUG_PALLOC=1  pool-allocator debug bookkeeping
          # Extra HTTP modules the zstd filter realistically runs alongside,
          # so the module is exercised in a realistic nginx (not a stripped one):
          #   ssl, v2 (HTTP/2), gzip_static, realip, sub, addition, stub_status
          ./configure \
            --with-compat \
            --with-debug \
            --with-threads \
            --with-file-aio \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_v3_module \
            --with-http_gzip_static_module \
            --with-http_realip_module \
            --with-http_sub_module \
            --with-http_addition_module \
            --with-http_stub_status_module \
            --with-http_auth_request_module \
            --with-cc-opt="-DZSTD_STATIC_LINKING_ONLY -DNGX_DEBUG_PALLOC=1 -g3 -O0 -fno-omit-frame-pointer -funwind-tables $(pkg-config --cflags libzstd zlib libpcre2-8)" \
            --with-ld-opt="$(pkg-config --libs libzstd zlib libpcre2-8)" \
            --add-module="$GITHUB_WORKSPACE"

      - name: Strict compile of module sources (warnings as errors)
        run: |
          cd "${{ matrix.dir }}"
          NGINX_CFLAGS=$(awk '/^CFLAGS[[:space:]]*=/{sub(/^CFLAGS[[:space:]]*=[[:space:]]*/,""); print; exit}' objs/Makefile)
          ALL_INCS=$(awk '/^ALL_INCS[[:space:]]*=/{found=1} found{line=$0; sub(/^ALL_INCS[[:space:]]*=[[:space:]]*/,"",line); gsub(/\\$/, "", line); printf "%s ", line; if (!/\\$/) exit}' objs/Makefile)
          for src in \
            "$GITHUB_WORKSPACE/filter/ngx_http_zstd_filter_module.c" \
            "$GITHUB_WORKSPACE/static/ngx_http_zstd_static_module.c"; do
            echo "--- strict compile: $(basename "$src") ---"
            # NGINX_CFLAGS and ALL_INCS are flag lists that MUST word-split
            # into individual gcc arguments.
            # shellcheck disable=SC2086
            gcc -c -fPIC $NGINX_CFLAGS \
              -Wall -Wextra -Wshadow -Wstrict-aliasing \
              -Wunreachable-code -Wunused -Wwrite-strings -Werror \
              $ALL_INCS \
              "$src" -o "/tmp/$(basename "$src" .c).o"
          done
          echo "✓ All module sources compile cleanly with strict flags"

      - name: Build binary with module
        run: |
          cd "${{ matrix.dir }}"
          NGINX_CFLAGS=$(awk '/^CFLAGS[[:space:]]*=/{sub(/^CFLAGS[[:space:]]*=[[:space:]]*/,""); print; exit}' objs/Makefile)
          make -j"$(nproc)" modules \
            CFLAGS="$NGINX_CFLAGS -Wall -Wextra -Wshadow -Wstrict-aliasing \
                    -Wunreachable-code -Wunused -Werror"
          make -j"$(nproc)"
          ccache -s || true
          echo "✓ nginx binary built"

      - name: Verify built binary
        run: |
          ls -la "${{ matrix.dir }}/objs/${{ matrix.flavor }}"
          "${{ matrix.dir }}/objs/${{ matrix.flavor }}" -V 2>&1

      - name: Upload server binary artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: server-binary-${{ matrix.flavor }}-${{ matrix.version }}
          path: ${{ matrix.dir }}/objs/${{ matrix.flavor }}
          retention-days: 1

  # ── Build against libzstd 1.4.x — exercises the documented fallback
  #    paths (#ifdef ZSTD_c_targetCBlockSize and the ZSTD_VERSION_NUMBER
  #    boundary in zstd_comp_level validation) that the main 1.5.x build
  #    never touches. ZSTD_compressStream2 was added in 1.4.0, so that
  #    is the genuine module floor; we build it from source against the
  #    pinned nginx and run the truncation smoke test to prove the
  #    fallback paths still compile and produce correct compression. ─────
  build-old-libzstd:
    name: Build (libzstd 1.4.x — fallback paths)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: resolve

    env:
      # Resolved mainline nginx (used by the cache keys + download/build steps
      # below, both as ${{ env.NGINX_VERSION }} and the shell $NGINX_VERSION).
      NGINX_VERSION: ${{ needs.resolve.outputs.nginx_version }}
      # 1.4.5 is < 1.5.6 (so ZSTD_c_targetCBlockSize is absent and the
      # #ifdef guard's fallback compiles) and >= 1.4.0 (the module's
      # hard floor — ZSTD_compressStream2 is present). 1.4.0 itself
      # bumps the version macro to 10400 so ZSTD_minCLevel() is
      # available — the negative-level path of zstd_comp_level()
      # therefore takes the supported branch.
      OLD_ZSTD_VERSION: "1.4.5"

    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libpcre2-dev zlib1g-dev wget cmake python3 \
            python3-requests zstd

      - name: Cache libzstd 1.4.x source tarball
        id: zstd-tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: zstd-${{ env.OLD_ZSTD_VERSION }}.tar.gz
          key: zstd-src-${{ env.OLD_ZSTD_VERSION }}

      - name: Download libzstd 1.4.x
        if: steps.zstd-tarball.outputs.cache-hit != 'true'
        run: |
          wget -q -O "zstd-${OLD_ZSTD_VERSION}.tar.gz" \
            "https://github.com/facebook/zstd/releases/download/v${OLD_ZSTD_VERSION}/zstd-${OLD_ZSTD_VERSION}.tar.gz"

      - name: Build libzstd 1.4.x to a private prefix
        run: |
          tar -xzf "zstd-${OLD_ZSTD_VERSION}.tar.gz"
          cd "zstd-${OLD_ZSTD_VERSION}"
          # Build only the library; tests/binaries not needed.
          make -j"$(nproc)" -C lib PREFIX="$HOME/zstd14" \
            install-pc install-includes install-shared
          ls "$HOME/zstd14/lib/libzstd.so"* || \
            (echo "libzstd not installed" && exit 1)
          echo "ZSTD_INC=$HOME/zstd14/include" >> "$GITHUB_ENV"
          echo "ZSTD_LIB=$HOME/zstd14/lib"     >> "$GITHUB_ENV"
          # The header's ZSTD_VERSION_NUMBER is what gates the fallbacks:
          grep -E 'ZSTD_VERSION_(MAJOR|MINOR|RELEASE)[[:space:]]' \
               "$HOME/zstd14/include/zstd.h" | head -3

      - name: Cache nginx source tarball
        id: nginx-tarball-old
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: nginx-${{ env.NGINX_VERSION }}.tar.gz
          key: nginx-src-${{ env.NGINX_VERSION }}

      - name: Download nginx
        if: steps.nginx-tarball-old.outputs.cache-hit != 'true'
        run: wget -q "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"

      - name: Configure & build nginx with module against libzstd 1.4.x
        run: |
          tar -xzf "nginx-${NGINX_VERSION}.tar.gz"
          cd "nginx-${NGINX_VERSION}"
          # ZSTD_INC/ZSTD_LIB tell the module's filter/config to pick up
          # the private libzstd 1.4.x build, not the system one. No
          # -DZSTD_STATIC_LINKING_ONLY here on purpose: the fallback
          # paths must compile under the plain dynamic-link build too.
          ZSTD_INC="$ZSTD_INC" ZSTD_LIB="$ZSTD_LIB" \
            ./configure \
              --with-compat \
              --with-debug \
              --with-cc-opt="-Wall -Wextra -Wno-unused-parameter -Werror $(pkg-config --cflags zlib libpcre2-8)" \
              --with-ld-opt="$(pkg-config --libs zlib libpcre2-8)" \
              --add-module="$GITHUB_WORKSPACE"
          make -j"$(nproc)"
          # Verify the binary links against the *old* libzstd we built,
          # not the system one — otherwise the test is meaningless.
          ldd objs/nginx | grep libzstd | tee /tmp/libzstd.linkage
          if ! grep -q "$ZSTD_LIB" /tmp/libzstd.linkage; then
            echo "FAIL: nginx not linked against private libzstd 1.4.x"
            exit 1
          fi
          echo "✓ nginx built against libzstd 1.4.x at $ZSTD_LIB"
          # Make the freshly built libzstd visible at runtime for the
          # smoke test below (rpath is not set since the build went
          # through the dynamic auto-discovery path).
          echo "LD_LIBRARY_PATH=$ZSTD_LIB" >> "$GITHUB_ENV"
          echo "TEST_NGINX_BINARY=$PWD/objs/nginx" >> "$GITHUB_ENV"

      - name: Smoke test (decode-and-compare) against libzstd 1.4.x
        run: |
          cd "$GITHUB_WORKSPACE"
          # Re-use the existing decode-and-byte-compare smoke test so
          # the fallback paths are not just compiled but actually
          # exercised at run time — compression must produce a
          # byte-exact body when decompressed.
          python3 tools/test_encoding.py \
            --nginx-binary "$TEST_NGINX_BINARY" --port 18200
          echo "✓ libzstd 1.4.x fallback paths produce correct output"

  # ── ASAN + UBSAN build — catches the lifetime/UB bugs in this module's
  #    history (per-request ctx, terminal-frame). Uses valgrind.suppress'd
  #    knowledge; ASAN is faster than valgrind for CI. ───────────────────────
  build-asan:
    name: Build ASAN+UBSAN
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: resolve

    env:
      # Resolved mainline nginx — feeds the cache keys, download and the
      # uploaded artifact path below.
      NGINX_VERSION: ${{ needs.resolve.outputs.nginx_version }}

    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libzstd-dev \
            libpcre2-dev zlib1g-dev wget

      - name: Cache nginx source tarball
        id: nginx-tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: nginx-${{ env.NGINX_VERSION }}.tar.gz
          key: nginx-src-${{ env.NGINX_VERSION }}

      - name: Download nginx source tarball
        if: steps.nginx-tarball.outputs.cache-hit != 'true'
        run: wget -q "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"

      - name: Configure & build nginx with ASAN + UBSAN
        run: |
          tar -xzf "nginx-${NGINX_VERSION}.tar.gz"
          cd "nginx-${NGINX_VERSION}"
          SAN="-fsanitize=address,undefined -fno-sanitize-recover=undefined -fno-omit-frame-pointer -g3 -O1"
          ./configure \
            --with-compat \
            --with-debug \
            --with-cc-opt="-DZSTD_STATIC_LINKING_ONLY $SAN $(pkg-config --cflags libzstd zlib libpcre2-8)" \
            --with-ld-opt="$SAN $(pkg-config --libs libzstd zlib libpcre2-8)" \
            --add-module="$GITHUB_WORKSPACE"
          make -j"$(nproc)"
          echo "✓ ASAN+UBSAN nginx binary built"

      - name: Upload ASAN nginx binary
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: nginx-binary-asan
          path: nginx-${{ env.NGINX_VERSION }}/objs/nginx
          retention-days: 1

  # ── Full test suite — runs against the mainline binary ────────────────────
  tests:
    # The job-level name: cannot use the `env` context, but the `needs`
    # context IS available there — so the resolved version shows in the job
    # title without a hardcoded literal.
    name: Tests (nginx ${{ needs.resolve.outputs.nginx_version }} mainline)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [resolve, build]
    env:
      # Resolved mainline nginx — names the build artifact to download.
      NGINX_VERSION: ${{ needs.resolve.outputs.nginx_version }}

    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Cache apt packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /var/cache/apt/archives
          key: apt-tests-${{ runner.os }}-libperl-cpanminus-libzstd1
          restore-keys: apt-tests-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libperl-dev \
            cpanminus \
            libzstd1 \
            python3 \
            python3-requests \
            zstd

      - name: Download nginx binary (mainline, from build matrix)
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          # The build matrix uploads server-binary-<flavor>-<version>; the
          # full Perl/Python suite runs against nginx mainline specifically.
          name: server-binary-nginx-${{ env.NGINX_VERSION }}
          path: nginx-bin

      - name: Set up nginx binary
        run: |
          chmod +x nginx-bin/nginx
          echo "TEST_NGINX_BINARY=$GITHUB_WORKSPACE/nginx-bin/nginx" >> "$GITHUB_ENV"
          echo "✓ nginx binary ready: $(nginx-bin/nginx -v 2>&1)"

      - name: Cache Perl modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/perl5
          key: perl-modules-${{ runner.os }}-Test-Nginx-Socket

      - name: Install Test::Nginx::Socket
        run: |
          cpanm -l ~/perl5 --notest Test::Nginx::Socket
          echo "PERL5LIB=$HOME/perl5/lib/perl5:$PERL5LIB" >> "$GITHUB_ENV"

      - name: Run filter module tests
        run: |
          export PERL5LIB="$HOME/perl5/lib/perl5:${PERL5LIB:-}"
          export TEST_NGINX_SERVROOT="/tmp/nginx-servroot-filter"
          mkdir -p "$TEST_NGINX_SERVROOT"
          cd "$GITHUB_WORKSPACE"
          perl t/00-filter.t 2>&1 | sed 's/^Error:/Err:/' | tee t/filter-tests.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then echo "❌ Filter tests FAILED"; exit 1; fi
          echo "✓ Filter module: All tests passed"

      - name: Run static module tests
        run: |
          export PERL5LIB="$HOME/perl5/lib/perl5:${PERL5LIB:-}"
          export TEST_NGINX_SERVROOT="$GITHUB_WORKSPACE/t/servroot-static"
          mkdir -p "$TEST_NGINX_SERVROOT"
          touch -d @1541504307 "$GITHUB_WORKSPACE/t/suite/test" "$GITHUB_WORKSPACE/t/suite/test.zst"
          cd "$GITHUB_WORKSPACE"
          perl t/01-static.t 2>&1 | sed 's/^Error:/Err:/' | tee t/static-tests.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then echo "❌ Static tests FAILED"; exit 1; fi
          echo "✓ Static module: All tests passed"

      - name: Run truncation smoke test
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" --port 18080
          echo "✓ Truncation smoke test passed"

      - name: Run Vary smoke test
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" \
            --port 18081 --gzip-vary on --expect-vary
          echo "✓ Vary smoke test passed"

      - name: Run boundary-size smoke test
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" \
            --port 18082 --fixture-lines 1900
          echo "✓ Boundary-size smoke test passed"

      - name: Run repeated-request smoke test
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" \
            --port 18083 --request-count 2
          echo "✓ Repeated-request smoke test passed"

      - name: Run concurrent-request smoke test
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" \
            --port 18084 --concurrent-requests 2
          echo "✓ Concurrent-request smoke test passed"

      - name: Run terminal-frame regression test
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_terminal_frame.py --nginx-binary "$TEST_NGINX_BINARY" --port 18085
          echo "✓ Terminal-frame regression test passed"

      - name: Run proxy_buffering-off truncation regression (bug B)
        run: |
          cd "$GITHUB_WORKSPACE"
          # Reproduces the production trigger: zstd over an unbuffered
          # (proxy_buffering off) chunked, no-Content-Length upstream.
          # Decodes and byte-compares the full body across the
          # ZSTD_CStreamInSize buffer-boundary size matrix. Fails on a
          # module that forwards a zero-size buffer ("zero size buf in
          # writer" -> aborted/truncated response).
          python3 tools/test_proxy_unbuffered_truncation.py \
            --nginx-binary "$TEST_NGINX_BINARY" \
            --port 18086 --backend-port 18087
          echo "✓ proxy_buffering-off truncation regression passed"

      - name: Run broad compression correctness matrix
        timeout-minutes: 12
        run: |
          cd "$GITHUB_WORKSPACE"
          # ~504 cells: {proxy-buffered, proxy-unbuffered, static}
          # x {incompressible, highly-compressible, css}
          # x {1, CStreamInSize +/-1, 200000, 1MiB}
          # x {zstd, gzip+zstd, gzip-only, identity} x repeat.
          # Every cell decodes per Content-Encoding and byte-compares
          # to origin, or asserts correct fallback. Catches the whole
          # truncation / zero-size-buf / livelock bug class across the
          # circumstances it has historically recurred in (a step-level
          # timeout makes a CPU-spin livelock a hard FAIL, not a hang).
          python3 tools/test_compression_matrix.py \
            --nginx-binary "$TEST_NGINX_BINARY" \
            --port 18096 --backend-port 18097
          echo "✓ compression correctness matrix passed"

      - name: Run per-request CCtx isolation regression
        timeout-minutes: 6
        run: |
          cd "$GITHUB_WORKSPACE"
          # 774b4a5 class: a shared/not-reset ZSTD_CCtx silently bleeds
          # one request's compressor state into another (well-formed
          # but wrong body). Fire many distinct concurrent requests
          # through one worker over reused keepalive connections; each
          # response must decode byte-exact to its OWN origin.
          python3 tools/test_concurrent_cctx_isolation.py \
            --nginx-binary "$TEST_NGINX_BINARY" \
            --port 18098 --backend-port 18099 \
            --concurrency 16 --rounds 6
          echo "✓ per-request CCtx isolation regression passed"

      - name: Run reload-under-load correctness regression
        timeout-minutes: 6
        run: |
          cd "$GITHUB_WORKSPACE"
          # 2c538e0 CDict-cycle class: SIGHUP reload while requests are
          # in flight (zstd_dict_file set). Every response — old-cycle,
          # straddling, new-cycle — must still decode byte-exact; master
          # must survive; error log must stay clean. Complements
          # tools/test_reload_leak.sh (which checks leaks, not response
          # correctness during reload).
          python3 tools/test_reload_under_load.py \
            --nginx-binary "$TEST_NGINX_BINARY" \
            --port 18100 --backend-port 18101 \
            --reloads 6 --workers 4 --duration 18
          echo "✓ reload-under-load correctness regression passed"

      - name: Run zstd_long (LDM) directive regression
        timeout-minutes: 6
        run: |
          cd "$GITHUB_WORKSPACE"
          # 8edb7bb zstd_long class: the directive had ZERO coverage.
          # A 16 MiB body whose duplicate region repeats beyond the
          # level-6 default window must (a) decode byte-exact and
          # (b) compress ~2:1 smaller with zstd_long on than off —
          # proving ZSTD_c_enableLongDistanceMatching actually reached
          # libzstd and engaged, and the directive neither corrupts nor
          # truncates the stream (the bug-B failure mode).
          python3 tools/test_zstd_long_ldm.py \
            --nginx-binary "$TEST_NGINX_BINARY" \
            --port 18102 --backend-port 18103
          echo "✓ zstd_long (LDM) directive regression passed"

      - name: Test summary
        if: success()
        run: echo "✓ All Perl + Python end-to-end tests passed"

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: test-logs
          path: |
            ${{ github.workspace }}/t/filter-tests.log
            ${{ github.workspace }}/t/static-tests.log
          retention-days: 7

  # ── Smoke tests under ASAN+UBSAN — fails on any memory/UB error ───────────
  tests-asan:
    name: Tests ASAN+UBSAN
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-asan

    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-requests zstd libzstd1 \
            libperl-dev cpanminus

      - name: Download ASAN nginx binary
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: nginx-binary-asan
          path: nginx-bin

      - name: Set up nginx binary
        run: |
          chmod +x nginx-bin/nginx
          echo "TEST_NGINX_BINARY=$GITHUB_WORKSPACE/nginx-bin/nginx" >> "$GITHUB_ENV"

      - name: Cache Perl modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/perl5
          key: perl-modules-${{ runner.os }}-Test-Nginx-Socket

      - name: Install Test::Nginx::Socket
        run: |
          cpanm -l ~/perl5 --notest Test::Nginx::Socket
          echo "PERL5LIB=$HOME/perl5/lib/perl5:$PERL5LIB" >> "$GITHUB_ENV"

      - name: Run Perl suites under ASAN+UBSAN
        # Put the static-file / magic-probe / conditional / HEAD paths (covered
        # only by these Perl suites, audit CI7) through ASan/UBSan. Functional
        # pass/fail is already gated by the non-ASan `tests` job, so here we
        # DON'T gate on test results: nginx core
        # emits benign sanitizer aborts on some Test::Nginx request paths
        # unrelated to this module. Run non-halting, write ASan reports to
        # files, and fail ONLY if a sanitizer report names this module's
        # sources (ngx_http_zstd). detect_leaks=0 because nginx does not free
        # every allocation at exit by design.
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=0:abort_on_error=0:exitcode=0:log_path=/tmp/asan-zstd
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=0
        run: |
          export PERL5LIB="$HOME/perl5/lib/perl5:${PERL5LIB:-}"
          rm -f /tmp/asan-zstd.*
          cd "$GITHUB_WORKSPACE"
          export TEST_NGINX_SERVROOT="/tmp/nginx-servroot-asan"
          mkdir -p "$TEST_NGINX_SERVROOT"
          perl t/00-filter.t > t/filter-asan.log 2>&1 || true
          touch -d @1541504307 "$GITHUB_WORKSPACE/t/suite/test" "$GITHUB_WORKSPACE/t/suite/test.zst"
          export TEST_NGINX_SERVROOT="$GITHUB_WORKSPACE/t/servroot-static"
          mkdir -p "$TEST_NGINX_SERVROOT"
          perl t/01-static.t > t/static-asan.log 2>&1 || true
          # Gate strictly on sanitizer reports attributable to this module.
          if cat /tmp/asan-zstd.* t/filter-asan.log t/static-asan.log 2>/dev/null \
               | grep -nE 'ngx_http_zstd' \
               | grep -iE 'runtime error|AddressSanitizer|Sanitizer|overflow|use-after'; then
            echo "❌ sanitizer report attributable to the zstd module:"
            cat /tmp/asan-zstd.* 2>/dev/null | grep -B2 -A15 ngx_http_zstd || true
            exit 1
          fi
          echo "✓ no ASAN/UBSAN report attributable to the zstd module"

      - name: Run smoke tests under ASAN+UBSAN
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:strict_string_checks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" --port 18090
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" --port 18091 --fixture-lines 1900
          python3 tools/test_encoding.py --nginx-binary "$TEST_NGINX_BINARY" --port 18092 --concurrent-requests 2
          python3 tools/test_terminal_frame.py --nginx-binary "$TEST_NGINX_BINARY" --port 18093
          python3 tools/test_proxy_unbuffered_truncation.py \
            --nginx-binary "$TEST_NGINX_BINARY" --port 18094 --backend-port 18095
          # Matrix under ASAN/UBSAN at repeat=1 (252 cells) — the
          # truncation/zero-size-buf/livelock class has UB+lifetime
          # history, so exercise the full circumstance matrix with
          # sanitizers, not just the happy path.
          python3 tools/test_compression_matrix.py \
            --nginx-binary "$TEST_NGINX_BINARY" --port 18096 \
            --backend-port 18097 --repeat 1
          # CCtx isolation under ASAN/UBSAN: a shared/not-reset context
          # is a lifetime bug — exactly what ASAN is for. Lighter
          # concurrency/rounds since the sanitized binary is slower.
          python3 tools/test_concurrent_cctx_isolation.py \
            --nginx-binary "$TEST_NGINX_BINARY" --port 18098 \
            --backend-port 18099 --concurrency 8 --rounds 3
          echo "✓ All smoke tests clean under ASAN+UBSAN"

      - name: zstd_dict_file reload leak check (CDict lifecycle)
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          cd "$GITHUB_WORKSPACE"
          bash tools/test_reload_leak.sh "$TEST_NGINX_BINARY" 5


